<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }}'s Songs Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='images/Spotify_Logo_RGB_Black.png') }}" alt="Spotify Logo">
    </header>
    
    <main>
        <h1>{{ name }}'s Songs Analysis</h1>
        <h2>Top 10 Songs by Play Count</h2>
        <div>
            {{ top_songs_by_play_count|safe }}
        </div>
        <h2>Top 10 Songs by Minutes Played</h2>
        <div>
            {{ top_songs_by_minutes_played|safe }}
        </div>
    </main>
    
    <footer>
        <p>Spotify Data Analysis | Dash Kim</p>
    </footer>
</body>
</html>
